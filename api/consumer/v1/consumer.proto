syntax = "proto3";

package api.consumer.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

option go_package = "review-c/api/consumer/v1;v1";
option java_multiple_files = true;
option java_package = "api.consumer.v1";

// Consumer —— 评价中台 C 端（消费者）对外 HTTP 契约。
// - 仅暴露 C 端发评 / 看评相关的 4 个 RPC：CreateReview / GetReview / ListReviewByUserID / ListReviews。
// - 内部通过 gRPC 调 review-service；本层做 PB↔PB 转换与 caller_role=CALLER_ROLE_C 注入。
// - 字段名与 review-service/api/review/v1/review.proto 1:1 对齐以减少转换代码。
// - 越权防护：user_id 一致性校验在 HTTP 中间件做（path.user_id == X-User-Id），这里不写。
service Consumer {
  // [REQ-001] C 端创建评价（按 order_id 幂等，下游保证）
  rpc CreateReview(CreateReviewRequest) returns (CreateReviewReply) {
    option (google.api.http) = {
      post: "/v1/reviews"
      body: "*"
    };
  }

  // [REQ-002] C 端查看评价详情（非 APPROVED 会被下游折叠为 NotFound；匿名评价 user_id=0）
  rpc GetReview(GetReviewRequest) returns (GetReviewReply) {
    option (google.api.http) = {
      get: "/v1/reviews/{review_id}"
    };
  }

  // [REQ-003] C 端"我的评价"列表（含待审/驳回状态，下游按 role=C 隐式处理）
  rpc ListReviewByUserID(ListReviewByUserIDRequest) returns (ListReviewByUserIDReply) {
    option (google.api.http) = {
      get: "/v1/users/{user_id}/reviews"
    };
  }

  // [REQ-003] C 端按条件列表（仅 APPROVED；筛选子集见下方 ListReviewsRequest）
  rpc ListReviews(ListReviewsRequest) returns (ListReviewsReply) {
    option (google.api.http) = {
      get: "/v1/reviews"
    };
  }
}

// ---------- Enums（与 review-service 同语义、同数值） ----------

enum ReviewStatus {
  REVIEW_STATUS_UNSPECIFIED = 0;
  REVIEW_STATUS_PENDING = 10;
  REVIEW_STATUS_APPROVED = 20;
  REVIEW_STATUS_REJECTED = 30;
  REVIEW_STATUS_HIDDEN = 40;
}

enum AppealStatus {
  APPEAL_STATUS_UNSPECIFIED = 0;
  APPEAL_STATUS_PENDING = 10;
  APPEAL_STATUS_APPROVED = 20;
  APPEAL_STATUS_REJECTED = 30;
}

enum ReviewSort {
  REVIEW_SORT_UNSPECIFIED = 0;
  REVIEW_SORT_CREATE_TIME_DESC = 1;
  REVIEW_SORT_SCORE_ASC = 2;
  REVIEW_SORT_SCORE_DESC = 3;
}

// ---------- Common Messages ----------

message PaginationReply {
  int64 total = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ReviewSummary {
  int64 review_id = 1;
  int64 order_id = 2;
  int64 user_id = 3;          // 匿名评价在 C 端返回时为 0（下游 review-service 脱敏）
  int64 store_id = 4;
  int64 sku_id = 5;
  int64 spu_id = 6;
  int32 score = 7;
  int32 service_score = 8;
  int32 express_score = 9;
  string content = 10;
  bool anonymous = 11;
  bool has_media = 12;
  bool has_reply = 13;
  bool is_default = 14;
  ReviewStatus status = 15;
  google.protobuf.Timestamp create_time = 16;
  google.protobuf.Timestamp update_time = 17;
}

message ReplyInfo {
  int64 reply_id = 1;
  int64 review_id = 2;
  int64 store_id = 3;
  string content = 4;
  repeated string pic_urls = 5;
  repeated string video_urls = 6;
  google.protobuf.Timestamp create_time = 7;
  google.protobuf.Timestamp update_time = 8;
  int32 version = 9;
}

message ReviewDetail {
  ReviewSummary summary = 1;
  repeated string pic_urls = 2;
  repeated string video_urls = 3;
  string tags_json = 4;
  string goods_snapshot_json = 5;
  repeated ReplyInfo replies = 6;
  // C 端不暴露 ReviewAuditInfo（运营审核元数据对消费者无意义；下游过滤后本层也不回填）
}

// ---------- CreateReview ----------

// 字段与 review-service.CreateReviewRequest 1:1 对齐；user_id 由 HTTP 中间件校验与 X-User-Id 一致
// （防止 A 用户伪造 B 的订单评价）。
message CreateReviewRequest {
  int64 user_id = 1 [(validate.rules).int64.gt = 0];
  int64 order_id = 2 [(validate.rules).int64.gt = 0];
  int64 store_id = 3 [(validate.rules).int64.gt = 0];
  int64 sku_id = 4 [(validate.rules).int64.gt = 0];
  int64 spu_id = 5 [(validate.rules).int64.gt = 0];
  int32 score = 6 [(validate.rules).int32 = {gte: 1, lte: 5}];
  int32 service_score = 7 [(validate.rules).int32 = {gte: 0, lte: 5}];
  int32 express_score = 8 [(validate.rules).int32 = {gte: 0, lte: 5}];
  string content = 9 [(validate.rules).string = {min_len: 1, max_len: 512}];
  repeated string pic_urls = 10 [(validate.rules).repeated.max_items = 9];
  repeated string video_urls = 11 [(validate.rules).repeated.max_items = 3];
  bool anonymous = 12;
  string tags_json = 13 [(validate.rules).string.max_len = 1024];
  string goods_snapshot_json = 14 [(validate.rules).string.max_len = 2048];
}

message CreateReviewReply {
  int64 review_id = 1;
}

// ---------- GetReview ----------

message GetReviewRequest {
  int64 review_id = 1 [(validate.rules).int64.gt = 0];
}

message GetReviewReply {
  ReviewDetail review = 1;
}

// ---------- ListReviewByUserID ----------

message ListReviewByUserIDRequest {
  int64 user_id = 1 [(validate.rules).int64.gt = 0];
  int32 page = 2 [(validate.rules).int32.gte = 0];
  int32 page_size = 3 [(validate.rules).int32 = {gte: 0, lte: 100}];
}

message ListReviewByUserIDReply {
  repeated ReviewSummary list = 1;
  PaginationReply page = 2;
}

// ---------- ListReviews ----------

// C 端筛选子集：只开放 store_id / spu_id / sku_id / score / has_media / sort / 分页。
// 禁止的字段：user_id（隐私）/ status（下游 role=C 会强制 APPROVED）/ has_reply（内部实现细节）。
// 这些字段即使 proto 里不存在，中间件也不需要额外拦截。
message ListReviewsRequest {
  int64 store_id = 1 [(validate.rules).int64.gte = 0];
  int64 spu_id = 2 [(validate.rules).int64.gte = 0];
  int64 sku_id = 3 [(validate.rules).int64.gte = 0];
  int32 score = 4 [(validate.rules).int32 = {gte: 0, lte: 5}];
  bool has_media = 5;
  ReviewSort sort = 6 [(validate.rules).enum.defined_only = true];
  int32 page = 7 [(validate.rules).int32.gte = 0];
  int32 page_size = 8 [(validate.rules).int32 = {gte: 0, lte: 100}];
}

message ListReviewsReply {
  repeated ReviewSummary list = 1;
  PaginationReply page = 2;
}
